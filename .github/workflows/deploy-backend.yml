name: Deploy Backend → Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv and install dependencies
        working-directory: backend
        run: |
          python3 -m venv antenv
          antenv/bin/pip install --upgrade pip
          antenv/bin/pip install -r requirements.txt

      - name: Zip backend package (includes venv)
        run: |
          cd backend
          zip -r ../backend-deploy.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend-deploy.zip
